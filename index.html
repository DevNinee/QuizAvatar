<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Qual Nação de Avatar Você Seria?</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">

  <section id="inicio" class="ativa">
    <h1>Descubra sua Nação</h1>
    <p>No universo Avatar, quatro elementos são os dominantes: Água, Terra, Fogo e Ar. </p>
     <p>Responda 10 perguntas e descubra qual elemento combina mais com você! </p>
    <button id="btnIniciar">Iniciar Quiz</button>
  </section>

  <section id="quiz">
    <p id="progresso"></p>
    <h2 id="pergunta"></h2>

    <div class="opcoes-area">
      <button class="opcao"></button>
      <button class="opcao"></button>
      <button class="opcao"></button>
      <button class="opcao"></button>
    </div>
  </section>

  <section id="resultado">
    <img id="imgResultado" src="" alt="Elemento">
    <h2>Sua nação é:</h2>
    <div id="elementoFinal"></div>
    <p id="descricao"></p>
    <button id="reiniciar">Refazer Quiz</button>
  </section>

</div>

  <script src="script.js"></script>
</body>
</html>
